name: prince_life_tracker
description: "Prince's Lifestyle Matrix - A comprehensive habit tracker dashboard with real-time tracking and premium UI."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/prince_profile.png
    - assets/
  
